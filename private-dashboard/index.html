<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio analytics (private)</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
        --border: #30363d;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      main {
        max-width: 36rem;
        width: 100%;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.5rem;
      }
      p {
        color: var(--muted);
        line-height: 1.5;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 1.5rem 0 0;
        display: grid;
        gap: 0.75rem;
      }
      a {
        display: block;
        padding: 0.875rem 1rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        border-color: var(--accent);
      }
      .status {
        font-size: 0.875rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Portfolio analytics</h1>
      <p class="status">Private hub · Tailscale only · custom metrics UI later</p>
      <p>Public site tracking (GoatCounter + Clarity) runs on the GitHub Pages portfolio. Use the dashboards below for now.</p>
      <ul>
        <li>
          <a href="https://cwarre33.github.io/portfolio/" target="_blank" rel="noopener noreferrer"
            >Live portfolio</a
          >
        </li>
        <li>
          <a href="https://www.goatcounter.com/" target="_blank" rel="noopener noreferrer"
            >GoatCounter dashboard</a
          >
        </li>
        <li>
          <a href="https://clarity.microsoft.com/" target="_blank" rel="noopener noreferrer"
            >Microsoft Clarity</a
          >
        </li>
      </ul>
    </main>
  </body>
</html>
